name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one deploy at a time; let an in-progress run finish rather than cancel it.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infr
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infr/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::238576302016:role/GitHubActionsDeploy-NatuveaWebsite
          aws-region: eu-west-2

      - name: CDK deploy
        run: npx cdk deploy --require-approval never
